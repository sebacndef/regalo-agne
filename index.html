<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Agne 🤍</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    background: #1a0a0a;
    color: #f5e6e8;
    font-family: 'Lato', sans-serif;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 3rem 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .stars, .petals {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
  }

  .petal {
    position: absolute;
    opacity: 0;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.5; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(255,200,200,0.2);
    border-radius: 20px;
    padding: 3rem 2.5rem;
    max-width: 520px;
    width: 100%;
    text-align: center;
    backdrop-filter: blur(4px);
  }

  .heart-icon {
    font-size: 2rem;
    margin-bottom: 1.2rem;
    display: block;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  .for-label {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 0.85rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(245,200,210,0.6);
    margin-bottom: 0.4rem;
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 400;
    color: #f5d0d8;
    margin-bottom: 1.8rem;
    line-height: 1.1;
  }

  .divider {
    width: 48px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(220,150,170,0.6), transparent);
    margin: 0 auto 1.8rem;
  }

  .message {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.08rem;
    line-height: 1.75;
    color: rgba(245,225,230,0.88);
    margin-bottom: 2.2rem;
  }

  .video-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(200,80,100,0.18);
    border: 0.5px solid rgba(220,120,140,0.4);
    color: #f5ccd4;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    padding: 0.9rem 2rem;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-bottom: 2rem;
  }

  .video-btn:hover {
    background: rgba(200,80,100,0.32);
    border-color: rgba(220,120,140,0.7);
    transform: scale(1.03);
  }

  .video-wrapper {
    display: none;
    margin-bottom: 1.5rem;
    border-radius: 14px;
    overflow: hidden;
    border: 0.5px solid rgba(220,120,140,0.3);
  }

  .video-wrapper.visible {
    display: block;
  }

  .video-wrapper iframe {
    width: 100%;
    aspect-ratio: 16/9;
    border: none;
    display: block;
  }

  .footer-note {
    font-size: 0.78rem;
    color: rgba(245,200,210,0.35);
    letter-spacing: 0.1em;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255,220,230,0.5);
    border-radius: 50%;
    animation: twinkle ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.7; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="stars" id="stars"></div>
  <div class="petals" id="petals"></div>

  <div class="card">
    <span class="heart-icon">🤍</span>
    <p class="for-label">Para</p>
    <h1 class="name">Agne</h1>
    <div class="divider"></div>
    <p class="message">
      Patito, acá está el regalo sorpresa que te prometí,<br>
      por el aniversario de nuestros primeros 3 añitos.<br><br>
      Te amo — espero que te guste 🤍
    </p>

    <button class="video-btn" id="playBtn" onclick="showVideo()">
      <span>▶</span> Ver tu regalo
    </button>

    <div class="video-wrapper" id="videoWrapper">
      <iframe
        id="videoFrame"
        src=""
        allow="autoplay; fullscreen"
        allowfullscreen>
      </iframe>
    </div>

    <p class="footer-note">✦ solo para vos ✦</p>
  </div>
</div>

<script>
  function showVideo() {
    const wrapper = document.getElementById('videoWrapper');
    const frame = document.getElementById('videoFrame');
    const btn = document.getElementById('playBtn');
    frame.src = 'https://drive.google.com/file/d/1E6xhGuj5dVmj123w8MfgH6fI8mNcjuIB/preview';
    wrapper.classList.add('visible');
    btn.style.display = 'none';
  }

  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDuration = (2 + Math.random() * 3) + 's';
    s.style.animationDelay = (Math.random() * 3) + 's';
    starsEl.appendChild(s);
  }

  const petalsEl = document.getElementById('petals');
  const petalChars = ['✿', '❀', '✾', '❁', '⁕'];
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petalChars[Math.floor(Math.random() * petalChars.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (6 + Math.random() * 8) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.fontSize = (0.7 + Math.random() * 0.8) + 'rem';
    p.style.color = ['#f4a7b9', '#e8869a', '#f9ccd4', '#d4728a'][Math.floor(Math.random() * 4)];
    petalsEl.appendChild(p);
  }
</script>
</body>
</html>
